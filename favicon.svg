<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main microchip body -->
  <rect x="48" y="48" width="96" height="96" rx="8" fill="url(#chipGrad)" stroke="#0F172A" stroke-width="2"/>
  
  <!-- Circuit pattern inside chip -->
  <g stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.8">
    <!-- Horizontal lines -->
    <line x1="60" y1="72" x2="132" y2="72"/>
    <line x1="60" y1="96" x2="132" y2="96"/>
    <line x1="60" y1="120" x2="132" y2="120"/>
    
    <!-- Vertical connection points -->
    <circle cx="72" cy="72" r="2" fill="#ffffff"/>
    <circle cx="96" cy="72" r="2" fill="#ffffff"/>
    <circle cx="120" cy="72" r="2" fill="#ffffff"/>
    
    <circle cx="72" cy="96" r="2" fill="#ffffff"/>
    <circle cx="120" cy="96" r="2" fill="#ffffff"/>
    
    <circle cx="72" cy="120" r="2" fill="#ffffff"/>
    <circle cx="96" cy="120" r="2" fill="#ffffff"/>
    <circle cx="120" cy="120" r="2" fill="#ffffff"/>
  </g>
  
  <!-- Left pins (4) -->
  <rect x="32" y="60" width="16" height="8" rx="2" fill="#14B8A6" stroke="#0F172A" stroke-width="1"/>
  <rect x="32" y="80" width="16" height="8" rx="2" fill="#14B8A6" stroke="#0F172A" stroke-width="1"/>
  <rect x="32" y="100" width="16" height="8" rx="2" fill="#14B8A6" stroke="#0F172A" stroke-width="1"/>
  <rect x="32" y="120" width="16" height="8" rx="2" fill="#14B8A6" stroke="#0F172A" stroke-width="1"/>
  
  <!-- Right pins (4) -->
  <rect x="144" y="60" width="16" height="8" rx="2" fill="#0EA5E9" stroke="#0F172A" stroke-width="1"/>
  <rect x="144" y="80" width="16" height="8" rx="2" fill="#0EA5E9" stroke="#0F172A" stroke-width="1"/>
  <rect x="144" y="100" width="16" height="8" rx="2" fill="#0EA5E9" stroke="#0F172A" stroke-width="1"/>
  <rect x="144" y="120" width="16" height="8" rx="2" fill="#0EA5E9" stroke="#0F172A" stroke-width="1"/>
  
  <!-- Top pins (2) -->
  <rect x="68" y="32" width="8" height="16" rx="2" fill="#14B8A6" stroke="#0F172A" stroke-width="1"/>
  <rect x="116" y="32" width="8" height="16" rx="2" fill="#14B8A6" stroke="#0F172A" stroke-width="1"/>
  
  <!-- Bottom pins (2) -->
  <rect x="68" y="144" width="8" height="16" rx="2" fill="#0EA5E9" stroke="#0F172A" stroke-width="1"/>
  <rect x="116" y="144" width="8" height="16" rx="2" fill="#0EA5E9" stroke="#0F172A" stroke-width="1"/>
</svg>